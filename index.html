<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Hangout — Cross-platform</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Landing / Room Entry UI -->
  <div id="landing">
    <div id="landing-card">
      <h1>AR Hangout</h1>
      <p>Meet in AR on Quest · 3D on desktop · works everywhere</p>
      <input id="room-input" type="text" maxlength="6" placeholder="Room code (e.g. SUNNY)" autocomplete="off" />
      <div id="landing-buttons">
        <button id="btn-create">Create Room</button>
        <button id="btn-join">Join Room</button>
      </div>
      <p id="landing-status"></p>
    </div>
  </div>

  <!-- In-session HUD (shown during XR) -->
  <div id="hud" class="hidden">
    <div id="hud-top">
      <span id="hud-room">Room: —</span>
      <span id="hud-peers">0 others</span>
    </div>

    <!-- Emoji reaction bar -->
    <div id="emoji-bar">
      <button class="emoji-btn" data-emoji="👋">👋</button>
      <button class="emoji-btn" data-emoji="❤️">❤️</button>
      <button class="emoji-btn" data-emoji="😄">😄</button>
      <button class="emoji-btn" data-emoji="🎉">🎉</button>
      <button class="emoji-btn" data-emoji="👍">👍</button>
    </div>

    <!-- Object spawn toolbar -->
    <div id="object-bar">
      <button class="obj-btn" data-shape="cube" title="Spawn Cube">&#9632;</button>
      <button class="obj-btn" data-shape="sphere" title="Spawn Sphere">&#9679;</button>
      <button class="obj-btn" data-shape="torus" title="Spawn Torus">&#9711;</button>
    </div>

    <button id="btn-exit-xr">Exit AR</button>
  </div>

  <!-- Floating emoji container (DOM overlays) -->
  <div id="emoji-floats"></div>

  <!-- Three.js canvas target -->
  <canvas id="xr-canvas"></canvas>

  <!-- Start button (shown after room is ready; label set dynamically) -->
  <div id="ar-prompt" class="hidden">
    <button id="btn-start-ar" disabled>Detecting…</button>
    <p id="ar-status"></p>
    <div id="desktop-hints" class="hint-row hidden">
      <span>🖱 Drag to orbit</span>
      <span>📜 Scroll to zoom</span>
      <span>🖱 Click object to grab</span>
      <span>⌨ Del to delete</span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="js/app.js"></script>

  <!-- Show desktop hints once btn-start-ar says "Enter 3D" -->
  <script>
    const _obs = new MutationObserver(() => {
      const btn   = document.getElementById('btn-start-ar');
      const hints = document.getElementById('desktop-hints');
      if (btn && hints) hints.classList.toggle('hidden', btn.textContent !== 'Enter 3D');
    });
    _obs.observe(document.getElementById('btn-start-ar'), { childList: true, subtree: true, characterData: true });
  </script>
</body>
</html>
